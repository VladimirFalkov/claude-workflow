name: Manifest tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  manifest-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run manifest tests
        run: pytest tests/manifest/ -v
